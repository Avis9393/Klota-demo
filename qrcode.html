<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLOTA 运维管理工具 - 扫码演示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #F8F8FA;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
  box-shadow: 0 4px 32px rgba(0,0,0,0.06);
  max-width: 420px;
  width: 100%;
}
.logo {
  width: 64px; height: 64px;
  border: 1.5px solid rgba(0,180,216,0.2);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 28px;
  font-weight: 700;
  color: #1E2030;
  background: #F8F8FA;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.card h1 { font-size: 20px; color: #1E2030; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
.card .subtitle { font-size: 13px; color: #9999AA; margin-bottom: 32px; }
#qrcode { display: flex; justify-content: center; margin-bottom: 24px; }
#qrcode img, #qrcode canvas { border-radius: 12px; }
.url-box {
  background: #F8F8FA;
  border: 1px solid #E8E8EE;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 13px;
  color: #1E2030;
  word-break: break-all;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
  font-family: 'SF Mono', Consolas, monospace;
}
.url-box:hover { border-color: #00B4D8; background: #f0f9fc; }
.copy-hint { font-size: 12px; color: #bbb; margin-bottom: 24px; }
.status {
  display: inline-block;
  background: #E8F5E9;
  color: #2E7D32;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: 20px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">K</div>
  <h1>KLOTA 运维管理工具</h1>
  <p class="subtitle">手机扫码即可体验完整演示</p>
  <div id="qrcode"></div>
  <div class="url-box" id="urlBox" onclick="copyUrl()">https://funny-bublanina-cedfee.netlify.app/</div>
  <div class="copy-hint">点击地址复制到剪贴板</div>
  <div class="status">已上线 · 全球可访问</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById('qrcode'), {
  text: 'https://funny-bublanina-cedfee.netlify.app/',
  width: 220,
  height: 220,
  colorDark: '#1E2030',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.M
});
function copyUrl() {
  navigator.clipboard.writeText('https://funny-bublanina-cedfee.netlify.app/').then(function() {
    var el = document.getElementById('urlBox');
    el.textContent = '已复制！';
    el.style.borderColor = '#00B4D8';
    setTimeout(function() {
      el.textContent = 'https://funny-bublanina-cedfee.netlify.app/';
      el.style.borderColor = '';
    }, 1500);
  });
}
</script>
</body>
</html>
